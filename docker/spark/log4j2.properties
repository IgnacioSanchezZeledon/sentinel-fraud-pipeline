status = warn
name = sentinel-spark

appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n%ex

rootLogger.level = warn
rootLogger.appenderRef.console.ref = console

logger.jetty1.name = org.sparkproject.jetty
logger.jetty1.level = warn
logger.jetty2.name = org.sparkproject.jetty.util.component.AbstractLifeCycle
logger.jetty2.level = error

logger.nativeCodeLoader.name = org.apache.hadoop.util.NativeCodeLoader
logger.nativeCodeLoader.level = error

logger.metricsConfig.name = org.apache.hadoop.metrics2.impl.MetricsConfig
logger.metricsConfig.level = error

logger.adminClientConfig.name = org.apache.kafka.clients.admin.AdminClientConfig
logger.adminClientConfig.level = error

logger.resolveWriteToStream.name = org.apache.spark.sql.execution.streaming.ResolveWriteToStream
logger.resolveWriteToStream.level = error

logger.repl.name = org.apache.spark.repl.Main
logger.repl.level = warn
