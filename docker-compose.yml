services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: sentinel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT:-2181}
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "10"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sentinel-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_CLIENT_PORT:-2181}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sentinel-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_TOPIC: ${KAFKA_TOPIC:-transactions}
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-3}
      KAFKA_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-1}
    command:
      - bash
      - -euc
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic $${KAFKA_TOPIC} --partitions $${KAFKA_NUM_PARTITIONS} --replication-factor $${KAFKA_REPLICATION_FACTOR}
        echo 'topic ready:'
        kafka-topics --bootstrap-server kafka:29092 --list
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: sentinel-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: sentinel-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      BRONZE_BUCKET: ${BRONZE_BUCKET:-bronze}
      SILVER_BUCKET: ${SILVER_BUCKET:-silver}
      GOLD_BUCKET: ${GOLD_BUCKET:-gold}
      MLFLOW_BUCKET: ${MLFLOW_BUCKET:-mlflow}
    entrypoint: ["/bin/sh"]
    command:
      - -euc
      - |
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}
        for b in $${BRONZE_BUCKET} $${SILVER_BUCKET} $${GOLD_BUCKET} $${MLFLOW_BUCKET}; do
          mc mb --ignore-existing local/$$b
        done
        echo 'buckets ready:'
        mc ls local
    restart: "no"

  spark-master:
    image: apache/spark:3.5.0
    container_name: sentinel-spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "0.0.0.0"]
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "${SPARK_MASTER_WEBUI_PORT:-8080}:8080"
      - "7077:7077"
    volumes:
      - ./docker/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    depends_on:
      minio:
        condition: service_healthy

  spark-worker:
    image: apache/spark:3.5.0
    container_name: sentinel-spark-worker
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --memory
      - ${SPARK_WORKER_MEMORY:-2g}
      - --cores
      - "${SPARK_WORKER_CORES:-2}"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - ./docker/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    depends_on:
      spark-master:
        condition: service_started

volumes:
  minio_data:
